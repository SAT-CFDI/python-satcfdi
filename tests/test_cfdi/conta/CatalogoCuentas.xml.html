<html>

	<style>
@page {
	@bottom-left{
		content: "Catalogo" " versión: " "1.1";

	}
	@bottom-center{

	}
	@bottom-right{
		content: "Página " counter(page) " de " counter(pages);

	}
}
@media print {
	.pagebreak { page-break-before: always; }
}
body {
	font-family: Arial;
	font-size: 9pt;
}
h3, h4, h5, h6 {
	margin: 0;
	color: white;
	font-weight: bold;
}
h3 {
	font-size: 9.89pt;
	background-color: #333;
	padding: 3px 0;
	text-align: center;
	letter-spacing: 4px;
}
h4 {
	font-size: 9.89pt;

	padding: 3px 0;
	text-align: center;
	letter-spacing: 4px;
}
h5 {
	font-size: 8.6pt;

	text-align: left;
	letter-spacing: 2px;
}
h6 {
	font-size: 7.47pt;
	background-color: #999;
	padding: 2px 0 2px 15px;
	text-align: left;
	letter-spacing: 1px;
}
.h {

.c { font-size: 8.6pt; }

table {

	border-spacing: 0;
}
table table { font-size: 7.47pt; }
table table table { font-size: 6.5pt; }
table table table table { font-size: 5.65pt; }
table th { background-color: #e0e0e0; }
table table th { background-color: #e8e8e8; }
table table table th { background-color: #f0f0f0; }
table table table table th { background-color: #f8f8f8; }
table td { background-color: #fff; }
.htd {
	text-align: right;
	width: 1px;
	white-space: nowrap;
	font-weight: bold;
}
.nb { break-inside: avoid; }
.cen { text-align: center; }
.r { text-align: right; }
.rbt {
	text-align: right;
	border-top: 1px solid black;
}
th {
	padding: 1px;
	vertical-align: center;
	text-align: center;
	border-right: 2px solid white;
}
th:last-child { border-right: none; }
td {
	vertical-align: top;
	padding: 1px 2px 1px 0;
}
tr:last-child td { padding-bottom: 0; }
td:last-child { padding-right: 0; }
tr { break-inside: avoid; }
.tot {
	margin-left: 50%;
	width: 50%;
}
table.tot {
	margin-top: 1px;
	break-inside: avoid;
}
table.tot tr:first-child { border-top: 1px solid; }
hr {
	border: none;
	height: 1px;
	background-color: black;
	break-after: avoid;
}
ul { margin: 0; }	</style>
</head>
